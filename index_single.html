<html lang="ko">
<head>
  <meta charset="utf-8" />

  <title>강의실 확인</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial, sans-serif; margin: 0; background:#f6f7f9; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 20px; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius: 14px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    h1 { font-size: 18px; margin: 0 0 12px; }
    label { display:block; font-size: 13px; margin: 12px 0 6px; color:#111827; }
    input, select, textarea, button {
      width: 100%; box-sizing: border-box;
      border:1px solid #d1d5db; border-radius: 10px;
      padding: 10px 12px; font-size: 14px; background:#fff;
    }
    textarea { min-height: 90px; resize: vertical; }
    button { margin-top: 14px; cursor: pointer; border-color:#111827; background:#111827; color:#fff; font-weight: 700; }
    button:active { transform: translateY(1px); }
    .muted { color:#6b7280; font-size: 12px; margin-top: 8px; }
    .err { color:#b91c1c; font-size: 13px; margin-top: 10px; white-space: pre-line; }
    .ok  { color:#065f46; font-size: 13px; margin-top: 10px; white-space: pre-line; }
    .out { margin-top: 14px; padding-top: 12px; border-top:1px solid #e5e7eb; }
    pre { background:#0b1020; color:#e5e7eb; padding: 12px; border-radius: 12px; overflow:auto; font-size: 12px; }
    .pill { display:inline-block; padding: 3px 8px; border-radius: 999px; font-size: 12px; border:1px solid #e5e7eb; background:#f9fafb; margin-right: 6px; }
    .backdrop{
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: none;
  z-index: 999;
}

.modal{
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(720px, calc(100vw - 24px));
  max-height: min(80vh, 820px);
  overflow: hidden;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,.25);
  display: none;
  z-index: 1000;
}

.modal__header{
  display:flex; align-items:center; justify-content:space-between;
  padding: 12px 14px;
  border-bottom: 1px solid #eee;
}

.modal__title{ font-weight: 700; }
.modal__close{
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid #eee; background:#fafafa;
  font-size: 20px; line-height: 1;
  cursor: pointer;
}

.modal__body{
  padding: 12px 14px;
  overflow: auto;
  max-height: calc(80vh - 110px);
}

.modal__footer{
  padding: 12px 14px;
  border-top: 1px solid #eee;
  display:flex; justify-content:flex-end; gap: 8px;
}

.roomlist{
  display:flex; flex-direction:column; gap: 10px;
}

.roomcard{
  border: 1px solid #eee;
  border-radius: 12px;
  padding: 10px 12px;
}

.roomcard__top{
  display:flex; align-items:center; justify-content:space-between;
  gap: 10px;
}

.roomcard__name{ font-weight: 700; }
.roomcard__meta{ margin-top: 8px; }
.roomcard__note{ margin-top: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>강의실 확인</h1>

      <label for="roomInput">강의실 번호 (숫자)</label>
      <input id="roomInput" inputmode="numeric" placeholder="예: 103" />

      <label for="lectureSelect">강의명</label>
      <select id="lectureSelect">
        <option value="">(선택)</option>
      </select>

      

      <label for="reasonInput">사유</label>
      <textarea id="reasonInput" placeholder="고장 증상을 설명해주세요."></textarea>

      <button id="confirmBtn" type="button">확인</button>

      <div id="msg" class="muted"></div>

      <div class="out">
        <div id="summary"></div>
        <pre id="jsonOut" style="display:none;"></pre>
      </div>
    </div>
  </div>


  <!-- Backdrop + Modal -->
<div id="backdrop" class="backdrop" aria-hidden="true"></div>

<div id="modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="modal__header">
    <div class="modal__title">대체 강의실 추천</div>
    <button id="modalCloseBtn" class="modal__close" type="button">×</button>
  </div>

  <div id="modalBody" class="modal__body"></div>

  <div class="modal__footer">
    <button id="modalOkBtn" type="button">닫기</button>
  </div>
</div>

function uniq(arr) {
  const s = new Set();
  const out = [];
  for (const v of arr) {
    const key = (v ?? "").toString().trim();
    if (!key) continue;
    if (!s.has(key)) {
      s.add(key);
      out.push(key);
    }
  }
  return out;
}

function roomTypeLabel(t) {
  if (t === 0) return "대관금지";
  if (t === 1) return "유형 1";
  if (t === 2) return "유형 2";
  if (t === 3) return "유형 3";
  return "미정";
}

function normalizeRoomNo(input) {
  const s = (input ?? "").toString().trim();
  const digits = s.replace(/[^\d]/g, "");
  return digits ? digits : "";
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function findRoom(roomNoStr) {
  return (
    ROOMS_DATA.find((r) => String(r["강의실명"] ?? "").trim() === String(roomNoStr ?? "").trim()) ||
    null
  );
}

// =========================
// 2) 시간/충돌 로직
// =========================
function getTodayDow() {
  const now = new Date();
  const dayMap = ["일", "월", "화", "수", "목", "금", "토"];
  return dayMap[now.getDay()];
}

function getNowMin() {
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

// 선택된 강의명(=사유) 기준으로 "오늘" 시간 구하기
function getRequestTimeBySelectedLecture(roomNo, lectureName) {
  const requestDow = getTodayDow();
  const nowMin = getNowMin();

  const items = REGULAR_DATA
    .filter((r) => String(r?.["강의실"] ?? "") === String(roomNo))
    .filter((r) => String(r?.["요일"] ?? "") === requestDow)
    .filter((r) => String(r?.["사유"] ?? "").trim() === String(lectureName ?? "").trim())
    .map((r) => ({
      startMin: Math.round(Number(r?.["시작"]) * 1440),
      endMin: Math.round(Number(r?.["종료"]) * 1440),
    }))
    .filter((x) => Number.isFinite(x.startMin) && Number.isFinite(x.endMin))
    .sort((a, b) => a.startMin - b.startMin);

  if (!items.length) return null;

  // 1) 진행 중 우선
  const ongoing = items.find((x) => x.startMin <= nowMin && nowMin < x.endMin);
  if (ongoing) return { requestDow, reqStartMin: ongoing.startMin, reqEndMin: ongoing.endMin };

  // 2) 오늘 남은 것 중 가장 빠른 강의
  const next = items.find((x) => nowMin < x.endMin);
  if (next) return { requestDow, reqStartMin: next.startMin, reqEndMin: next.endMin };

  return null;
}

// 시간 겹침 여부(겹치면 true)
function hasRegularConflict(roomNo, requestDow, reqStartMin, reqEndMin) {
  return REGULAR_DATA
    .filter((r) => String(r?.["강의실"] ?? "") === String(roomNo))
    .filter((r) => String(r?.["요일"] ?? "") === String(requestDow))
    .some((r) => {
      const startMin = Math.round(Number(r?.["시작"]) * 1440);
      const endMin = Math.round(Number(r?.["종료"]) * 1440);
      if (!Number.isFinite(startMin) || !Number.isFinite(endMin)) return false;

      // 겹침 조건: NOT(완전히 앞 OR 완전히 뒤)
      return !(reqEndMin <= startMin || reqStartMin >= endMin);
    });
}

// 강의실 입력 시: 오늘 해당 강의실의 사유 목록 + 현재 진행중 자동 선택
function autoSelectLectureByNow(roomNo) {
  const todayDow = getTodayDow();
  const nowMin = getNowMin();

  const todayLectures = REGULAR_DATA
    .filter((r) => String(r?.["강의실"] ?? "") === String(roomNo))
    .filter((r) => String(r?.["요일"] ?? "") === todayDow)
    .map((r) => ({
      name: (r?.["사유"] ?? "").toString().trim(),
      startMin: Math.round(Number(r?.["시작"] ?? 0) * 1440),
      endMin: Math.round(Number(r?.["종료"] ?? 0) * 1440),
    }))
    .filter((x) => x.name)
    .sort((a, b) => a.startMin - b.startMin);

  if (!todayLectures.length) return { list: [], auto: "" };

  const ongoing = todayLectures.find((lec) => lec.startMin <= nowMin && nowMin < lec.endMin);

  return {
    list: todayLectures,
    auto: ongoing ? ongoing.name : todayLectures[0].name,
  };
}

function getAltRooms(currentRoom, requestDow, reqStartMin, reqEndMin) {
  if (!currentRoom) return { list: [], hasNonZero: false };

  const curCap = Number(currentRoom["수용인원"] ?? 0);
  const curTypeRaw = currentRoom["유형"];
  const curType = Number.isFinite(Number(curTypeRaw)) ? Number(curTypeRaw) : null;

  // 현재 유형이 미정이면 "유형 제한"을 강제할 수 없으므로, 유형 필터는 완화합니다.
  const hasCurType = curType === 0 || curType === 1 || curType === 2 || curType === 3;

  const candidates = ROOMS_DATA
    .filter((r) => String(r["강의실명"] ?? "") !== String(currentRoom["강의실명"] ?? ""))
    .map((r) => ({
      room: r,
      cap: Number(r["수용인원"] ?? 0),
      type: Number.isFinite(Number(r["유형"])) ? Number(r["유형"]) : null,
    }))
    // 수용인원 조건
    .filter((x) => x.cap >= curCap)
    // 유형 조건(<=) : 현재 유형이 미정이면 제한하지 않음
    .filter((x) => (hasCurType ? (x.type !== null && x.type <= curType) : x.type !== null))
    // REGULAR 충돌 금지
    .filter((x) => !hasRegularConflict(String(x.room["강의실명"] ?? ""), requestDow, reqStartMin, reqEndMin));

  const nonZero = candidates.filter((x) => x.type !== 0);
  const zero = candidates.filter((x) => x.type === 0);

  // 유형 0은 "대체 후보가 없을 때만" 노출
  const finalList = nonZero.length ? nonZero : zero;

  finalList.sort((a, b) => {
    const tA = Number(a.type ?? 999),
      tB = Number(b.type ?? 999);
    if (tA !== tB) return tA - tB;
    if (a.cap !== b.cap) return a.cap - b.cap;
    return String(a.room["강의실명"] ?? "").localeCompare(String(b.room["강의실명"] ?? ""), "ko");
  });

  return { list: finalList.map((x) => x.room), hasNonZero: nonZero.length > 0 };
}

// =========================
// 4) DOM + 모달
// =========================
const lectureSelect = document.getElementById("lectureSelect");
const roomInput = document.getElementById("roomInput");
const reasonInput = document.getElementById("reasonInput");
const confirmBtn = document.getElementById("confirmBtn");
const msgEl = document.getElementById("msg");
const summaryEl = document.getElementById("summary");
const jsonOutEl = document.getElementById("jsonOut");

const backdropEl = document.getElementById("backdrop");
const modalEl = document.getElementById("modal");
const modalBodyEl = document.getElementById("modalBody");
const modalCloseBtn = document.getElementById("modalCloseBtn");
const modalOkBtn = document.getElementById("modalOkBtn");

function openModal(html) {
  if (!backdropEl || !modalEl || !modalBodyEl) return;
  modalBodyEl.innerHTML = html;
  backdropEl.style.display = "block";
  modalEl.style.display = "block";
  backdropEl.setAttribute("aria-hidden", "false");
  modalEl.setAttribute("aria-hidden", "false");
}

function closeModal() {
  if (!backdropEl || !modalEl || !modalBodyEl) return;
  modalBodyEl.innerHTML = "";
  backdropEl.style.display = "none";
  modalEl.style.display = "none";
  backdropEl.setAttribute("aria-hidden", "true");
  modalEl.setAttribute("aria-hidden", "true");
}

// 닫기
if (backdropEl) backdropEl.addEventListener("click", closeModal);
if (modalCloseBtn) modalCloseBtn.addEventListener("click", closeModal);
if (modalOkBtn) modalOkBtn.addEventListener("click", closeModal);
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

if (!lectureSelect || !roomInput || !reasonInput || !confirmBtn || !msgEl || !summaryEl || !jsonOutEl) {
  console.error("필수 DOM 요소가 없습니다. index.html의 id를 확인하십시오.");
}

// =========================
// 5) 초기 드롭다운(전체 사유)
// =========================
(function initLectureDropdownAll() {
  lectureSelect.innerHTML = `<option value="">선택하십시오</option>`;

  const lectures = uniq(REGULAR_DATA.map((x) => x && x["사유"]));
  lectures.sort((a, b) => a.localeCompare(b, "ko"));

  for (const lec of lectures) {
    const opt = document.createElement("option");
    opt.value = lec;
    opt.textContent = lec;
    lectureSelect.appendChild(opt);
  }

  msgEl.className = "muted";
  msgEl.textContent = `강의 ${lectures.length}개, 강의실 ${ROOMS_DATA.length}개를 로드하였습니다.`;
})();

// =========================
// 6) 강의실 입력 UX
// =========================
roomInput.addEventListener("input", () => {
  const normalized = normalizeRoomNo(roomInput.value);
  // 입력값도 숫자로 정리해 표시(UX)
  if (roomInput.value !== normalized) roomInput.value = normalized;

  if (!normalized) return;

  const result = autoSelectLectureByNow(normalized);
  if (!result) return;

  if (result.list && result.list.length) {
    lectureSelect.innerHTML = `<option value="">선택하십시오</option>`;
    for (const lec of result.list) {
      const opt = document.createElement("option");
      opt.value = lec.name;
      opt.textContent = lec.name;
      lectureSelect.appendChild(opt);
    }
    lectureSelect.value = result.auto || "";
  }
});

const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxePKbOLQeJbCGN52BuY8YH-qWktA9rsMKeY1t5ccZ8IaX7Uh-AfOlzADNJwIFVo32Wmg/exec";

async function appendToSheet({ roomNo, reason, lectureName }) {
  const payload = {
    roomNo: String(roomNo ?? "").trim(),
    reason: String(reason ?? "").trim(),
    lectureName: String(lectureName ?? "").trim(),
    clientTime: new Date().toISOString(),
  };

  // ⚠️ CORS preflight를 피하려고 Content-Type을 text/plain로 둡니다.
  // (Apps Script doPost는 e.postData.contents에서 그대로 JSON.parse 가능)
  const res = await fetch(GAS_WEB_APP_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload),
  });

  // 응답 JSON 파싱(실패하면 에러 처리)
  const data = await res.json().catch(() => null);

  if (!res.ok || !data || !data.ok) {
    const msg = (data && data.error) ? data.error : `HTTP ${res.status}`;
    throw new Error(msg);
  }

  return true;
}

// =========================
// 7) 확인 버튼
// =========================
confirmBtn.addEventListener("click", () => {
  summaryEl.innerHTML = "";
  jsonOutEl.style.display = "none";
  jsonOutEl.textContent = "";

  const lecture = (lectureSelect.value ?? "").toString().trim();
  const roomNo = normalizeRoomNo(roomInput.value);
  const reason = (reasonInput.value ?? "").toString().trim();

  const errors = [];
  if (!lecture) errors.push("• 강의명을 선택하십시오.");
  if (!roomNo) errors.push("• 강의실 번호(숫자)를 입력하십시오.");

  if (errors.length) {
    msgEl.className = "err";
    msgEl.textContent = errors.join("\n");
    return;
  }

  // (1) 선택된 강의명으로 오늘 시간(시작/종료) 확정
  const reqInfo = getRequestTimeBySelectedLecture(roomNo, lecture);
  if (!reqInfo) {
    msgEl.className = "err";
    msgEl.textContent =
      "선택된 강의명으로 오늘(REGULAR) 시간 정보를 찾지 못했습니다.\n" +
      "• 강의실/요일/강의명이 REGULAR과 일치하는지 확인하십시오.";
    return;
  }
  const { requestDow, reqStartMin, reqEndMin } = reqInfo;

  // (2) 현재 강의실 메타
  const room = findRoom(roomNo);

  // (3) 모달: 대체 강의실 추천 + (4) 시트 기록 상태 표시 영역 포함
  let modalHtml = "";
  const sheetStatusHtml = `
    <div class="muted" id="sheetStatus" style="margin-top:12px;">
      구글 시트에 기록 중입니다…
    </div>
  `;

  if (!room) {
    modalHtml = `
      <div class="err">현재 강의실(${escapeHtml(roomNo)})을 ROOMS_DATA에서 찾지 못했습니다. 대체 강의실 추천을 만들 수 없습니다.</div>
      <div class="muted" style="margin-top:8px;">ROOMS_DATA에 해당 강의실명이 존재하는지 확인하십시오.</div>
      ${sheetStatusHtml}
    `;
    openModal(modalHtml);
  } else {
    const { list: alts } = getAltRooms(room, requestDow, reqStartMin, reqEndMin);

    const header = `
      <div>
        <div><b>현재</b>: ${escapeHtml(room["강의실명"])}호 · 수용 ${escapeHtml(room["수용인원"] ?? "?")}</div>
      </div>
    `;

    if (!alts.length) {
      modalHtml = `
        ${header}
        <div class="err" style="margin-top:12px;">조건을 만족하는 대체 강의실이 없습니다.</div>
        ${sheetStatusHtml}
      `;
      openModal(modalHtml);
    } else {
      const items = alts
        .map((r) => {
          const pills = [
            `<span class="pill">${escapeHtml(roomTypeLabel(r["유형"]))}</span>`,
            `<span class="pill">수용 ${escapeHtml(r["수용인원"] ?? "?")}</span>`,
          ];
          return `
            <div class="roomcard">
              <div class="roomcard__top">
                <div class="roomcard__name">${escapeHtml(r["강의실명"])}호</div>
                <div>${pills.join("")}</div>
              </div>
            </div>
          `;
        })
        .join("");

      modalHtml = `
        ${header}
        <div class="roomlist" style="margin-top:12px;">
          ${items}
        </div>
        ${sheetStatusHtml}
      `;
      openModal(modalHtml);
    }
  }

  // =========================
  // (4) 모달을 띄운 뒤, 비동기로 시트에 기록하십시오.
  //     결과 메시지는 확인 버튼 아래가 아니라 모달 내부에만 출력하십시오.
  // =========================
  appendToSheet({ roomNo, reason, lectureName: lecture })
    .then(() => {
      const el = document.getElementById("sheetStatus");
      if (el) {
        el.className = "muted";
        el.textContent = "구글 시트에 기록되었습니다.";
      }
    })
    .catch((e) => {
      const el = document.getElementById("sheetStatus");
      if (el) {
        el.className = "err";
        el.textContent = `구글 시트 기록에 실패했습니다: ${String(e?.message ?? e)}`;
      }
    });
});
</script>
